name: Deploy Frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'eval/reports/archive/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    # 不绑定 environment - 避免 main 分支保护门拒绝
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build static site
        run: |
          mkdir -p _site/web _site/archive
          # web SPA · 拷贝全部
          cp -r web/* _site/web/
          # 把 index.html 同时提到根,方便访问 /
          cp _site/web/index.html _site/index.html
          # 归档 JSON
          cp -r eval/reports/archive/* _site/archive/
          # 禁用 Jekyll
          touch _site/.nojekyll
          ls -la _site/
          echo "--- archive ---"
          ls _site/archive/ | head -10

      - name: Push to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 用临时分支清掉 _site, switch 到 gh-pages
          git checkout -B gh-pages
          # 清空除了 .git 之外
          find . -path ./.git -prune -o -path './_site' -prune -o -exec rm -rf {} +
          # 拷 _site 内容到根
          cp -r _site/. .
          ls -la
          
          git add -A
          # 如果没变化就 no-op
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "deploy: ${{ github.sha }} | ${{ github.event.head_commit.message }}"
            git push origin HEAD:gh-pages --force
          fi
          git checkout main
