name: Deploy Frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'eval/reports/archive/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build static site
        run: |
          mkdir -p _site/web _site/archive
          # SPA 全部拷过去
          cp -r web/. _site/web/
          cp _site/web/index.html _site/index.html
          # 归档 JSON
          cp -r eval/reports/archive/. _site/archive/
          # 禁用 Jekyll
          touch _site/.nojekyll
          echo "--- _site ---"
          ls -la _site/
          echo "--- _site/web ---"
          ls -la _site/web/
          echo "--- _site/archive (top 10) ---"
          ls _site/archive/ | head -10

      - name: Deploy via peaceiris/actions-gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
          force_orphan: true
