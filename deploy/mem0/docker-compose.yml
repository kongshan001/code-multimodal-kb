# Mem0 自托管 stack（3 容器：API + pg/pgvector + Neo4j），按 mem0.ai self-host 指南。
# 用法：docker compose -f deploy/mem0/docker-compose.yml --env-file deploy/mem0/.env up -d --build
# 首次拉镜像 ~500MB，2-5 分钟。API 起来后访问 http://localhost:8888/docs。
# ⚠ 默认无 auth + CORS 全开，仅本地开发用；公网暴露前加固（runbook §Mem0）。
services:
  mem0:
    build: .
    depends_on:
      postgres: {condition: service_healthy}
      neo4j: {condition: service_healthy}
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0graph
    ports: ["8888:8000"]
    volumes: ["./history:/app/history"]
    restart: unless-stopped

  postgres:
    image: ankane/pgvector:latest
    environment: [POSTGRES_PASSWORD=postgres]
    ports: ["8432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: [pgdata:/var/lib/postgresql/data]
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/mem0graph
      - NEO4J_PLUGINS=["apoc"]
    ports: ["8474:7474", "8687:7687"]
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s          # Neo4j 首启最慢，给 90s 宽限
    volumes: [neo4jdata:/data]
    restart: unless-stopped

volumes:
  pgdata: {}
  neo4jdata: {}
