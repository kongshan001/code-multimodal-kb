<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 905" width="960" height="905">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei","SimHei",sans-serif}</style>
  <defs>
    <marker id="arrow-claude" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#5a5a5a"/></marker>
  </defs>
  <rect width="960" height="905" fill="#f8f6f3"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">ab_agent.py — LLM 调用链路（_create_with_retry）</text>
  <text x="480" y="56" text-anchor="middle" font-size="12.5" fill="#6a6a6a">Anthropic SDK 打 BigModel 兼容端点 · temperature=0 · 限流/5xx 指数退避重试 · usage 累计算成本</text>
  <rect x="240" y="80" width="360" height="92" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="260" y="104" font-size="16" font-weight="600" fill="#1a1a1a">① 调用入口</text>
  <text x="260" y="125" font-size="12.5" fill="#1a1a1a">_create_with_retry(client, model, system, messages, tools)</text>
  <text x="260" y="144" font-size="12" fill="#3a3a3a">• 主循环每轮：tools = arm_schemas(arm)（tool_use 协议）</text>
  <text x="260" y="162" font-size="12" fill="#3a3a3a">• 强制作答：tools = [] 禁再 tool_use  ·  retries = 4（最多 5 次）</text>
  <rect x="240" y="200" width="360" height="100" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="260" y="224" font-size="16" font-weight="600" fill="#1a1a1a">② make_client() · load_creds()</text>
  <text x="260" y="245" font-size="12" fill="#3a3a3a">• 凭据：env AB_API_KEY 优先</text>
  <text x="260" y="263" font-size="12" fill="#3a3a3a">• 否则 ~/.cc-connect/config.toml → providers[0]</text>
  <text x="260" y="281" font-size="12" fill="#3a3a3a">• 都无 → RuntimeError（凭据不入库）</text>
  <text x="260" y="295" font-size="12" fill="#3a3a3a">→ anthropic.Anthropic(key, base_url) · BigModel 端点打 GLM</text>
  <rect x="240" y="345" width="360" height="100" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="260" y="369" font-size="16" font-weight="600" fill="#1a1a1a">③ client.messages.create(…)</text>
  <text x="260" y="390" font-size="12.5" fill="#3a3a3a">• model = glm-5.x · max_tokens = 1024 · temperature = 0.0</text>
  <text x="260" y="408" font-size="12.5" fill="#3a3a3a">• system = 目标感知基底 prompt + 注入 skill SOP</text>
  <text x="260" y="426" font-size="12.5" fill="#3a3a3a">• messages = ReAct 多轮（user / assistant / tool_result）</text>
  <polygon points="420,469 540,517 420,565 300,517" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="420" y="513" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">调用成功?</text>
  <text x="420" y="532" text-anchor="middle" font-size="11" fill="#5a5a5a">无异常返回 resp</text>
  <polygon points="785,469 905,517 785,565 665,517" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="785" y="508" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">可重试?</text>
  <text x="785" y="524" text-anchor="middle" font-size="11" fill="#5a5a5a">RateLimit · 429</text>
  <text x="785" y="538" text-anchor="middle" font-size="11" fill="#5a5a5a">500·502·503·529</text>
  <rect x="240" y="605" width="360" height="80" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="260" y="629" font-size="16" font-weight="600" fill="#1a1a1a">④ 成功 → 累计 + 返回</text>
  <text x="260" y="650" font-size="12.5" fill="#3a3a3a">• in_tok / out_tok += resp.usage · llm_calls++</text>
  <text x="260" y="668" font-size="12.5" fill="#3a3a3a">• 返回 resp（交回 run_episode 主循环）</text>
  <rect x="240" y="715" width="360" height="120" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="260" y="739" font-size="16" font-weight="600" fill="#1a1a1a">⑤ resp 的去向</text>
  <text x="260" y="760" font-size="12.5" fill="#3a3a3a">• resp.content → {text, tool_use, thinking}</text>
  <text x="260" y="778" font-size="12.5" fill="#3a3a3a">• resp.stop_reason → tool_use 续轮 / end_turn 收尾</text>
  <text x="260" y="796" font-size="12.5" fill="#3a3a3a">• cost_$ = _cost(MODEL_PRICES × tokens / 1e6)</text>
  <text x="260" y="814" font-size="12.5" fill="#3a3a3a">• 未知模型 → cost None（不报错）</text>
  <rect x="675" y="605" width="220" height="56" rx="12" fill="#e8b4b8" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="785" y="629" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">raise（中断 episode）</text>
  <text x="785" y="648" text-anchor="middle" font-size="11.5" fill="#3a3a3a">其他 APIStatusError 直接抛</text>
  <line x1="420" y1="172" x2="420" y2="198" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="420" y1="300" x2="420" y2="343" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="420" y1="445" x2="420" y2="467" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="420" y1="565" x2="420" y2="603" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <text x="430" y="588" font-size="12" font-weight="600" fill="#1a1a1a">成功</text>
  <line x1="420" y1="685" x2="420" y2="713" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="540" y1="517" x2="663" y2="517" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <text x="548" y="510" font-size="12" font-weight="600" fill="#1a1a1a">否·异常</text>
  <line x1="785" y1="565" x2="785" y2="603" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <text x="793" y="588" font-size="12" font-weight="600" fill="#1a1a1a">否</text>
  <path d="M 785,469 L 785,320 L 600,320 L 600,370" fill="none" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-claude)"/>
  <text x="608" y="313" font-size="11.5" font-weight="600" fill="#1a1a1a">是 → sleep 2^i（1,2,4,8 s）· i++</text>
  <text x="608" y="337" font-size="11" fill="#7a3a3a">重试 5 次仍失败 → RuntimeError</text>
  <rect x="615" y="855" width="335" height="38" rx="8" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.2"/>
  <line x1="628" y1="875" x2="658" y2="875" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <text x="664" y="879" font-size="11.5" fill="#3a3a3a">主流程 / 数据流</text>
  <line x1="775" y1="875" x2="805" y2="875" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-claude)"/>
  <text x="811" y="879" font-size="11.5" fill="#3a3a3a">重试回边</text>
</svg>