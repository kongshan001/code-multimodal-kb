  <text x="190" y="470" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Memory · 主观层</text>
  <text x="190" y="498" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">MemPalace</text>
  <text x="190" y="522" text-anchor="middle" fill="#3a3a3a" font-size="12">• 用户偏好 / 决策</text>
  <text x="190" y="542" text-anchor="middle" fill="#3a3a3a" font-size="12">• 工作方式（type 四类）</text>
