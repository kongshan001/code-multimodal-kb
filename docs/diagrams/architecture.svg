  <rect x="910" y="440" width="240" height="180" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="1030" y="470" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Git/OpenSpec · 情景层</text>
  <text x="1030" y="498" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">git log + tasks.md</text>
  <text x="1030" y="522" text-anchor="middle" fill="#3a3a3a" font-size="12">• commit 时间线</text>
  <text x="1030" y="542" text-anchor="middle" fill="#3a3a3a" font-size="12">• openspec 变更/tasks</text>
  <text x="1030" y="562" text-anchor="middle" fill="#3a3a3a" font-size="12">• 决策锚点可回溯</text>
  <text x="1030" y="588" text-anchor="middle" fill="#6a6a6a" font-size="11" font-style="italic">何时发生→git</text>
