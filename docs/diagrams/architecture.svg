  <text x="750" y="542" text-anchor="middle" fill="#3a3a3a" font-size="12">• fireworks-tech-graph</text>
  <text x="750" y="562" text-anchor="middle" fill="#3a3a3a" font-size="12">• python-design-patterns…</text>
