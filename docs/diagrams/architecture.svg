  <rect x="483" y="366" width="104" height="20" rx="6" fill="#f8f6f3" stroke="#bbbbbb" stroke-width="1"/>
  <text x="535" y="381" text-anchor="middle" fill="#3a3a3a" font-size="12">被问起 → KB</text>
  <line x1="600" y1="316" x2="750" y2="440" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="623" y="366" width="104" height="20" rx="6" fill="#f8f6f3" stroke="#bbbbbb" stroke-width="1"/>
  <text x="675" y="381" text-anchor="middle" fill="#3a3a3a" font-size="12">怎么做 → Skill</text>
