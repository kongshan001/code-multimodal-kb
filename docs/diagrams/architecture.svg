<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}</style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0 0,9 4.5,0 9" fill="#5a5a5a"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000010"/></filter>
  </defs>
  <rect width="1200" height="680" fill="#f8f6f3"/>
  <text x="600" y="38" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">engineer_demo · 系统架构（D1 记忆四层归属 + Benchmark 评测）</text>
  <rect x="340" y="68" width="520" height="88" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="96" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Benchmark 评测层（eval/）</text>
  <text x="600" y="120" text-anchor="middle" fill="#3a3a3a" font-size="13">一个 harness 测 code / doc / memory + agent A/B（有 vs 无 KB）</text>
