  <text x="470" y="542" text-anchor="middle" fill="#3a3a3a" font-size="12">• graphify：文档图</text>
  <text x="470" y="562" text-anchor="middle" fill="#3a3a3a" font-size="12">• broad@5=0.846 · cross 100%</text>
  <text x="470" y="588" text-anchor="middle" fill="#6a6a6a" font-size="11" font-style="italic">查：被问起→KB</text>
  <rect x="630" y="440" width="240" height="180" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="750" y="470" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Skills · 程序层</text>
  <text x="750" y="498" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">~/.claude/skills</text>
