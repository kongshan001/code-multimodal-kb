<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1045" width="960" height="1045">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei","SimHei",sans-serif}</style>
  <defs><marker id="ac" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#5a5a5a"/></marker></defs>
  <rect width="960" height="1045" fill="#f8f6f3"/>
  <text x="480" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">bench 完整测试流程：dock → 造题 → 验收 → 人审 → 跑分 → 报告</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#6a6a6a">每阶段「做什么 + 实现原理」；跑分两支：Stage 0（零 LLM 代理）/ Stage 1（真跑 agent）</text>
  <rect x="280" y="80" width="400" height="104" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="300" y="103" font-size="15" font-weight="600" fill="#1a1a1a">① Dock 对接目标工程（bench-dock-target）</text>
  <text x="300" y="123" font-size="11.5" fill="#222">• 建 targets/&lt;id&gt;/ + target.json（id · language · code 路径）</text>
  <text x="300" y="140" font-size="11.5" fill="#222">• cmm index 代码 → BM25 倒排；graphify ingest 文档 → 知识图</text>
  <text x="300" y="157" font-size="11.5" fill="#222">• 机器路径走 target.json（gitignored 本地，cp 自 target.json.example）</text>
  <text x="300" y="176" font-size="11" fill="#6a4a1a">原理：索引一次查询多次；引擎零硬编码路径（全从 target 读）</text>
  <rect x="280" y="216" width="400" height="104" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="300" y="239" font-size="15" font-weight="600" fill="#1a1a1a">② 造题 goldgen（bench goldgen）</text>
  <text x="300" y="259" font-size="11.5" fill="#222">• codegraph 枚举真实符号（零 LLM）→ gold = 符号</text>
  <text x="300" y="276" font-size="11.5" fill="#222">• LLM 仅拟 NL query 措辞（答案 = 符号名）</text>
  <text x="300" y="293" font-size="11.5" fill="#222">• 写 problems.json，status=pending + provenance</text>
  <text x="300" y="312" font-size="11" fill="#1a5a4a">原理：gold 自证正确（符号即答案）→ 零 judge，只花便宜 token 拟措辞</text>
  <rect x="280" y="352" width="400" height="104" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="300" y="375" font-size="15" font-weight="600" fill="#1a1a1a">③ 验收 goldgen-verify</text>
  <text x="300" y="395" font-size="11.5" fill="#222">• 实证(零LLM)：ambiguity 同名歧义 + retrieval 检索一致</text>
  <text x="300" y="412" font-size="11.5" fill="#222">• 独立 subagent：NL query ↔ gold 语义匹配</text>
  <text x="300" y="429" font-size="11.5" fill="#222">• 原地标 verdict / reason</text>
  <text x="300" y="448" font-size="11" fill="#1a5a4a">原理：两层 vet（实证零成本 + 独立语义）过滤，人审只过 survivors</text>
  <rect x="280" y="488" width="400" height="85" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="300" y="511" font-size="15" font-weight="600" fill="#1a1a1a">④ 人审 approve（Gold Lab 前端）</text>
  <text x="300" y="531" font-size="11.5" fill="#222">• approve pending → status=accepted</text>
  <text x="300" y="548" font-size="11.5" fill="#222">• API 落盘前校验 schema（type↔gold · id 唯一）</text>
  <text x="300" y="565" font-size="11" fill="#6a4a1a">原理：人审是唯一主观关口；前端不碰 git（只亮「待提交」）</text>
  <text x="480" y="610" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">⑤ 跑分（两 stage，按需选）</text>
  <rect x="30" y="640" width="425" height="150" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="50" y="663" font-size="14" font-weight="600" fill="#1a1a1a">Stage 0 · 零 LLM token 代理</text>
  <text x="50" y="681" font-size="11" fill="#444">bench run ab · run_ab_value.py</text>
  <text x="50" y="700" font-size="11.5" fill="#222">• Arm B(KB)：cmm bm25 top-5 → 注入 token + kb_hit@5</text>
  <text x="50" y="717" font-size="11.5" fill="#222">• Arm A(grep)：grep -rl + 读 top3 文件 → naive 成本</text>
  <text x="50" y="734" font-size="11.5" fill="#222">• token = char/4 估算（不调 LLM）</text>
  <text x="50" y="752" font-size="11" font-weight="600" fill="#3a3a3a">指标：压缩比(naive/kb) · kb_hit@5 · grep 盲区率</text>
  <text x="50" y="772" font-size="11" fill="#5a4a1a">原理：零 LLM 代理「KB 压不压缩 / 命不命中」，秒级出数</text>
  <rect x="505" y="640" width="425" height="150" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="525" y="663" font-size="14" font-weight="600" fill="#1a1a1a">Stage 1 · 真跑 agent loop</text>
  <text x="525" y="681" font-size="11" fill="#444">bench run agent-compare · run_compare + run_episode</text>
  <text x="525" y="700" font-size="11.5" fill="#222">• 4 臂 no-kb / kb / kb+superpowers / kb+openspec</text>
  <text x="525" y="717" font-size="11.5" fill="#222">• run_episode ReAct loop × N 题 × runs（glm-5.x）</text>
  <text x="525" y="734" font-size="11.5" fill="#222">• _judge：gold ∈ 终答（broad match）</text>
  <text x="525" y="752" font-size="11" font-weight="600" fill="#1a5a4a">指标：准确率 · token · llm_calls · 步数 · cost</text>
  <text x="525" y="772" font-size="11" fill="#1a5a4a">原理：真端到端 agent 准确度 + 全程 token（凭据门控）</text>
  <rect x="280" y="825" width="400" height="120" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="300" y="848" font-size="15" font-weight="600" fill="#1a1a1a">⑥ 报告（agent_compare_report）</text>
  <text x="300" y="868" font-size="11.5" fill="#222">• result.md（结论+矩阵+逐题+诚实边界）+ summary.json</text>
  <text x="300" y="885" font-size="11.5" fill="#222">• arms/&lt;arm&gt;/{config, aggregate, episodes/qNN/}</text>
  <text x="300" y="902" font-size="11.5" fill="#222">• session.jsonl / thinking.md gitignore；result/summary 入库</text>
  <text x="300" y="921" font-size="11" fill="#1a5a4a">原理：人读 + 程序双出口；标注 LLM-judged / SOP-not-runtime</text>
  <text x="300" y="938" font-size="11" fill="#1a5a4a">不自动 git commit（人工提交）</text>
  <line x1="480" y1="184" x2="480" y2="213" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="480" y1="320" x2="480" y2="349" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="480" y1="456" x2="480" y2="485" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="480" y1="573" x2="480" y2="595" stroke="#5a5a5a" stroke-width="2"/>
  <path d="M 480,595 L 242,595 L 242,637" fill="none" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <path d="M 480,595 L 717,595 L 717,637" fill="none" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <path d="M 242,790 L 242,808 L 380,808 L 380,822" fill="none" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <path d="M 717,790 L 717,808 L 580,808 L 580,822" fill="none" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ac)"/>
  <rect x="280" y="978" width="400" height="48" rx="8" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.2"/>
  <text x="294" y="996" font-size="11" font-weight="600" fill="#1a1a1a">节点色</text>
  <rect x="294" y="1014" width="16" height="12" rx="2" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1"/>
  <text x="315" y="1014" font-size="10.5" fill="#3a3a3a">对接</text>
  <rect x="354" y="1014" width="16" height="12" rx="2" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="375" y="1014" font-size="10.5" fill="#3a3a3a">处理/agent</text>
  <rect x="452" y="1014" width="16" height="12" rx="2" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1"/>
  <text x="473" y="1014" font-size="10.5" fill="#3a3a3a">人审关口</text>
  <rect x="540" y="1014" width="16" height="12" rx="2" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1"/>
  <text x="561" y="1014" font-size="10.5" fill="#3a3a3a">零LLM代理</text>
</svg>