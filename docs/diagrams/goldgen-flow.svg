<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}</style>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0 0,9 4.5,0 9" fill="#5a5a5a"/></marker>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000010"/></filter></defs>
  <rect width="1200" height="720" fill="#f8f6f3"/>
  <text x="600" y="36" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">Goldgen · 扩题流程（agent 挖题 + 两层自动验收 + 人审）</text>
  <rect x="470" y="58" width="260" height="50" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="88" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">人给范围（seed 词 / 目录）</text>
  <line x1="600" y1="108" x2="600" y2="134" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="320" y="136" width="560" height="86" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="162" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">① generate · codegraph 枚举真实符号 + LLM 拟 NL 题</text>
  <text x="600" y="184" text-anchor="middle" fill="#3a3a3a" font-size="12">gold = 符号（构造即正确，零 LLM judge）→ 写 gold_pending.md</text>
  <text x="600" y="204" text-anchor="middle" fill="#6a6a6a" font-size="11">bench goldgen &lt;seeds&gt; --target X</text>
  <line x1="600" y1="222" x2="600" y2="248" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="120" y="250" width="960" height="36" rx="8" fill="none" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="600" y="273" text-anchor="middle" fill="#5a5a5a" font-size="13" font-weight="600">两层自动验收（人审前 vet · 互补）</text>
  <line x1="320" y1="286" x2="320" y2="304" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="100" y="306" width="440" height="124" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="320" y="332" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">② 实证 verify（零 LLM · grounded）</text>
  <text x="320" y="356" text-anchor="middle" fill="#3a3a3a" font-size="12">codegraph 查同名歧义（按模块归并）</text>
  <text x="320" y="376" text-anchor="middle" fill="#3a3a3a" font-size="12">+ 检索可达（信息项，NL 不强求）</text>
  <text x="320" y="400" text-anchor="middle" fill="#5a5a5a" font-size="11" font-style="italic">抓：Object/Color 同名歧义</text>
  <text x="320" y="420" text-anchor="middle" fill="#6a6a6a" font-size="11">bench goldgen-verify --target X</text>
  <rect x="660" y="306" width="440" height="124" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="880" y="332" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">③ 独立 subagent 验收（LLM 判断）</text>
  <text x="880" y="356" text-anchor="middle" fill="#3a3a3a" font-size="12">判 NL query ↔ gold 语义匹配</text>
  <text x="880" y="376" text-anchor="middle" fill="#3a3a3a" font-size="12">codegraph 查证符号实际含义 + 推理</text>
  <text x="880" y="400" text-anchor="middle" fill="#5a5a5a" font-size="11" font-style="italic">抓：get_local_scene 语义错配（实证漏的）</text>
  <text x="880" y="420" text-anchor="middle" fill="#6a6a6a" font-size="11">主 agent spawn 独立 Agent</text>
  <line x1="320" y1="430" x2="500" y2="470" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="880" y1="430" x2="700" y2="470" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="440" y="472" width="320" height="56" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="498" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">④ 人审（删/改）→ accept/reject/edit</text>
  <text x="600" y="518" text-anchor="middle" fill="#3a3a3a" font-size="12">扫一眼 verdict，~10 秒/条（review ≪ author）</text>
  <line x1="600" y1="528" x2="600" y2="556" stroke="#5a5a5a" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="420" y="558" width="360" height="56" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="584" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">fold → eval/gold_&lt;target&gt;.py</text>
  <text x="600" y="604" text-anchor="middle" fill="#3a3a3a" font-size="12">bench goldgen-fold · 去重 + snapshot 门禁</text>
  <text x="600" y="668" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">成本分离：gold 自证（0）+ LLM 拟措辞（便宜）+ 人审 query 质量（轻）</text>
  <text x="600" y="690" text-anchor="middle" fill="#6a6a6a" font-size="11">实证抓歧义 / subagent 抓语义错配 —— 两层互补，实测 20 题审掉 ~45%</text>
</svg>