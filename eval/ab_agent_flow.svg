<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 990" width="960" height="990">
  <style>text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","SimHei",sans-serif}</style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
  </defs>
  <rect width="960" height="990" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">ab_agent.py — run_episode() 执行流程图</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6b7280">Stage 1 agent A/B harness · ReAct loop + token 累计 + 429 退避 + 收敛纪律</text>
  <rect x="300" y="60" width="360" height="50" rx="25" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">run_episode(client, question, arm, target, …)</text>
  <text x="480" y="100" text-anchor="middle" font-size="11" fill="#047857">agent episode 入口 · arm 决定工具集 + 注入 skills</text>
  <rect x="300" y="140" width="360" height="130" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">初始化</text>
  <text x="316" y="184" font-size="11.5" fill="#1f2937">• load_creds() → mdl (glm-5.x · env 优先，否则 ~/.cc-connect)</text>
  <text x="316" y="202" font-size="11.5" fill="#1f2937">• _system_prompt(arm, target) = 基底 + 目标信息 + skill SOP</text>
  <text x="316" y="220" font-size="11.5" fill="#1f2937">• ab_tools.set_active(target)（目标感知，不再硬编码）</text>
  <text x="316" y="238" font-size="11.5" fill="#1f2937">• max_steps = 12 (skills) / 8 (baseline)</text>
  <text x="316" y="256" font-size="11.5" fill="#1f2937">• tools = arm_schemas(arm) · 计数器清零 · t0 = time()</text>
  <polygon points="480,300 600,345 480,390 360,345" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="480" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">i &lt; max_steps ?</text>
  <rect x="300" y="425" width="360" height="90" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="480" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">_create_with_retry()  ← LLM 调用</text>
  <text x="480" y="468" text-anchor="middle" font-size="11.5" fill="#1f2937">client.messages.create · tool_use · temperature=0</text>
  <text x="480" y="486" text-anchor="middle" font-size="11" fill="#6b7280">in_tok += input · out_tok += output · llm_calls++</text>
  <text x="480" y="503" text-anchor="middle" font-size="11" fill="#6b7280">429 / 529 / 503 → 指数退避重试 (1,2,4,8 s)</text>
  <rect x="300" y="545" width="360" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="568" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">序列化本轮响应</text>
  <text x="480" y="588" text-anchor="middle" font-size="11.5" fill="#1f2937">_serialize_turn(resp) → blocks / turn_text / thinking</text>
  <text x="480" y="606" text-anchor="middle" font-size="11.5" fill="#1f2937">写 session · messages · thinking · 更新 last_text</text>
  <text x="480" y="624" text-anchor="middle" font-size="11" fill="#6b7280">thinking：有 thinking block 用之，否则 fallback text</text>
  <polygon points="480,665 620,715 480,765 340,715" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="480" y="710" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9a3412">stop_reason ==</text>
  <text x="480" y="727" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9a3412">"tool_use" ?</text>
  <rect x="660" y="660" width="280" height="115" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="800" y="682" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">执行工具</text>
  <text x="676" y="702" font-size="11" fill="#1f2937">• 遍历 resp.content 的 tool_use blocks</text>
  <text x="676" y="719" font-size="11" fill="#1f2937">• _exec_tool → ab_tools.exec_tool</text>
  <text x="676" y="736" font-size="11" fill="#1f2937">• 记 tool_calls / tool_texts</text>
  <text x="676" y="753" font-size="11" fill="#1f2937">• 截断 2000 (TOOL_RESULT_CAP)</text>
  <text x="676" y="770" font-size="11" fill="#1f2937">• tool_result → messages + session</text>
  <rect x="20" y="660" width="280" height="115" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text x="160" y="682" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">强制作答 (max_steps 耗尽)</text>
  <text x="36" y="702" font-size="11" fill="#1f2937">• for-else 分支：循环未 break</text>
  <text x="36" y="719" font-size="11" fill="#1f2937">• truncated = True</text>
  <text x="36" y="736" font-size="11" fill="#1f2937">• 再调 LLM (tools=[] 禁 tool_use)</text>
  <text x="36" y="753" font-size="11" fill="#1f2937">• 累计其 in/out_tok · llm_calls++</text>
  <text x="36" y="770" font-size="11" fill="#1f2937">• answer = forced / last_text</text>
  <rect x="300" y="800" width="360" height="80" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="823" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">收尾</text>
  <text x="480" y="843" text-anchor="middle" font-size="11.5" fill="#1f2937">wall_clock_s = round(time() - t0, 2)</text>
  <text x="480" y="861" text-anchor="middle" font-size="11.5" fill="#1f2937">cost_$ = _cost(model, in_tok, out_tok)</text>
  <rect x="300" y="910" width="360" height="58" rx="25" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="932" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">return trace</text>
  <text x="480" y="950" text-anchor="middle" font-size="11" fill="#047857">answer · tokens · steps(=llm_calls) · tool_calls</text>
  <text x="480" y="964" text-anchor="middle" font-size="11" fill="#047857">truncated · wall_clock_s · cost_$ · session · thinking</text>
  <line x1="480" y1="110" x2="480" y2="137" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="270" x2="480" y2="297" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="390" x2="480" y2="422" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="500" y="409" font-size="11" font-weight="600" fill="#2563eb">是</text>
  <line x1="480" y1="515" x2="480" y2="542" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="635" x2="480" y2="662" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="765" x2="480" y2="797" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="492" y="785" font-size="11" font-weight="600" fill="#2563eb">否 (end_turn → break)</text>
  <line x1="480" y1="880" x2="480" y2="907" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="620" y1="715" x2="657" y2="715" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="630" y="708" font-size="11" font-weight="600" fill="#16a34a">是</text>
  <path d="M 800,660 L 800,345 L 603,345" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="808" y="500" font-size="11" font-weight="600" fill="#16a34a">下一轮</text>
  <text x="808" y="515" font-size="11" fill="#16a34a">i++ · 回到迭代顶部</text>
  <path d="M 360,345 L 160,345 L 160,657" fill="none" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="172" y="337" font-size="11" font-weight="600" fill="#dc2626">否 · 步数耗尽 (for-else)</text>
  <path d="M 160,775 L 160,840 L 297,840" fill="none" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <rect x="688" y="120" width="252" height="92" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="700" y="139" font-size="12" font-weight="600" fill="#374151">图例</text>
  <line x1="700" y1="156" x2="730" y2="156" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="738" y="160" font-size="11" fill="#374151">主流程 (control flow)</text>
  <line x1="700" y1="176" x2="730" y2="176" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="738" y="180" font-size="11" fill="#374151">ReAct 循环回边 (tool 迭代)</text>
  <line x1="700" y1="196" x2="730" y2="196" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="738" y="200" font-size="11" fill="#374151">步数耗尽 → 强制作答</text>
  <text x="480" y="982" text-anchor="middle" font-size="10" fill="#9ca3af">工具与臂在 eval/ab_tools.py 注册表（接新 KB 工具只改注册表，本文件不动）</text>
</svg>